name: Autograding Tests

on:
  - push
  - workflow_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install required R packages
        shell: bash
        run: |
          sudo Rscript -e 'options(repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/noble/latest")); install.packages("dplyr", lib = .Library)'

      - name: Verify dplyr is available
        shell: bash
        run: |
          Rscript -e 'library(dplyr); cat("dplyr OK:", as.character(packageVersion("dplyr")), "\n")'

      # ============================================
      # Q1 データ読み込み
      # ============================================
      - name: Q1 read raw data
        id: q1
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q1 read raw data
          command: >
            Rscript -e "source('HW4.R');
            if (!exists('co2_raw') || !exists('energy_raw') ||
                !is.data.frame(co2_raw) || !is.data.frame(energy_raw) ||
                nrow(co2_raw) <= 1000 || nrow(energy_raw) <= 1000)
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q2 dim の保存
      # ============================================
      - name: Q2 dimensions
        id: q2
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q2 dimensions
          command: >
            Rscript -e "source('HW4.R');
            if (!exists('dim_co2') || !exists('dim_energy') ||
                !identical(dim_co2, dim(co2_raw)) ||
                !identical(dim_energy, dim(energy_raw)))
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q3 co2_selected
      # ============================================
      - name: Q3 co2_selected
        id: q3
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q3 co2_selected
          command: >
            Rscript -e "source('HW4.R');
            req <- c('country','iso_code','year','co2','co2_per_capita','population','gdp');
            dup <- dplyr::filter(dplyr::count(co2_selected, iso_code, year), n > 1);
            if (!exists('co2_selected') || !is.data.frame(co2_selected) ||
                !all(req %in% names(co2_selected)) || length(names(co2_selected)) != length(req) ||
                any(is.na(co2_selected[['iso_code']])) || any(co2_selected[['iso_code']] == '') ||
                nrow(dup) != 0)
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q4 energy_selected
      # ============================================
      - name: Q4 energy_selected
        id: q4
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q4 energy_selected
          command: >
            Rscript -e "source('HW4.R');
            req <- c('country_energy','iso_code','year','primary_energy_consumption',
                     'fossil_fuel_consumption','renewables_consumption',
                     'renewables_share_energy','fossil_share_energy');
            dup <- dplyr::filter(dplyr::count(energy_selected, iso_code, year), n > 1);
            if (!exists('energy_selected') || !is.data.frame(energy_selected) ||
                !all(req %in% names(energy_selected)) || length(names(energy_selected)) != length(req) ||
                ('country' %in% names(energy_selected)) ||
                any(is.na(energy_selected[['iso_code']])) || any(energy_selected[['iso_code']] == '') ||
                nrow(dup) != 0)
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q5 merged_data
      # ============================================
      - name: Q5 merged_data
        id: q5
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q5 merged_data
          command: >
            Rscript -e "source('HW4.R');
            req <- c('country','iso_code','year','co2','co2_per_capita','population','gdp',
                     'country_energy','primary_energy_consumption','fossil_fuel_consumption',
                     'renewables_consumption','renewables_share_energy','fossil_share_energy');
            dup <- dplyr::filter(dplyr::count(merged_data, iso_code, year), n > 1);
            if (!exists('merged_data') || !is.data.frame(merged_data) ||
                !all(req %in% names(merged_data)) ||
                nrow(merged_data) != nrow(co2_selected) ||
                nrow(dup) != 0)
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q6 行数確認
      # ============================================
      - name: Q6 row counts
        id: q6
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q6 row counts
          command: >
            Rscript -e "source('HW4.R');
            if (!exists('n_co2_selected') || !exists('n_merged_data') ||
                n_co2_selected != nrow(co2_selected) ||
                n_merged_data != nrow(merged_data) ||
                n_co2_selected != n_merged_data)
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q7 欠損値確認
      # ============================================
      - name: Q7 missing summary
        id: q7
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q7 missing summary
          command: >
            Rscript -e "source('HW4.R');
            if (!exists('missing_summary') ||
                !is.numeric(missing_summary) ||
                !identical(names(missing_summary), names(merged_data)) ||
                !isTRUE(all.equal(missing_summary, colSums(is.na(merged_data)))))
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q8 selected_countries
      # ============================================
      - name: Q8 selected countries
        id: q8
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q8 selected countries
          command: >
            Rscript -e "source('HW4.R');
            target <- c('Japan','United States','China','Germany');
            if (!exists('selected_countries') || !is.data.frame(selected_countries) ||
                !all(selected_countries[['country']] %in% target) ||
                !all(selected_countries[['year']] >= 2000) ||
                !all(target %in% unique(selected_countries[['country']])) ||
                nrow(selected_countries) < 80)
              quit(status=1)"
          max-score: 1

      # ============================================
      # Reporter
      # ============================================
      - name: Autograding Reporter
        continue-on-error: true
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          Q1_RESULTS: "${{ steps.q1.outputs.result }}"
          Q2_RESULTS: "${{ steps.q2.outputs.result }}"
          Q3_RESULTS: "${{ steps.q3.outputs.result }}"
          Q4_RESULTS: "${{ steps.q4.outputs.result }}"
          Q5_RESULTS: "${{ steps.q5.outputs.result }}"
          Q6_RESULTS: "${{ steps.q6.outputs.result }}"
          Q7_RESULTS: "${{ steps.q7.outputs.result }}"
          Q8_RESULTS: "${{ steps.q8.outputs.result }}"
        with:
          runners: q1,q2,q3,q4,q5,q6,q7,q8
