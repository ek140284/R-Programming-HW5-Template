name: Autograding Tests

on:
  - push
  - workflow_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install required R packages
        shell: bash
        run: |
          sudo Rscript -e 'options(repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/noble/latest")); install.packages(c("tidyverse", "patchwork"), lib = .Library)'

      - name: Verify packages are available
        shell: bash
        run: |
          Rscript -e 'library(tidyverse); library(patchwork); cat("packages OK\n")'

      # ============================================
      # Q1 gas（t, Y）
      # ============================================
      - name: Q1 gas
        id: q1
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q1 gas
          command: >
            Rscript -e "source('HW5.R');
            n <- length(UKgas);
            ae <- function(a,b) isTRUE(all.equal(as.numeric(a), as.numeric(b), tolerance=1e-6));
            if (!exists('gas') || !is.data.frame(gas) || !all(c('t','Y') %in% names(gas)) ||
                nrow(gas) != n || !ae(gas[['t']], 1:n) || !ae(gas[['Y']], as.numeric(UKgas)))
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q2 reg（2次の多項式トレンド）
      # ============================================
      - name: Q2 reg
        id: q2
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q2 reg
          command: >
            Rscript -e "source('HW5.R');
            n <- length(UKgas); rt <- 1:n; rY <- as.numeric(UKgas);
            rtr <- as.numeric(predict(lm(rY ~ rt + I(rt^2))));
            ae <- function(a,b) isTRUE(all.equal(as.numeric(a), as.numeric(b), tolerance=1e-6));
            if (!exists('reg') || !inherits(reg,'lm') || length(coef(reg)) != 3 ||
                !ae(as.numeric(fitted(reg)), rtr))
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q3 gas$trend
      # ============================================
      - name: Q3 gas trend
        id: q3
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q3 gas trend
          command: >
            Rscript -e "source('HW5.R');
            n <- length(UKgas); rt <- 1:n; rY <- as.numeric(UKgas);
            rtr <- as.numeric(predict(lm(rY ~ rt + I(rt^2))));
            ae <- function(a,b) isTRUE(all.equal(as.numeric(a), as.numeric(b), tolerance=1e-6));
            if (!exists('gas') || !('trend' %in% names(gas)) || !ae(gas[['trend']], rtr))
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q4 gas$quarter
      # ============================================
      - name: Q4 gas quarter
        id: q4
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q4 gas quarter
          command: >
            Rscript -e "source('HW5.R');
            n <- length(UKgas); rq <- rep(c('Q1','Q2','Q3','Q4'), times=n/4);
            if (!exists('gas') || !('quarter' %in% names(gas)) || !is.factor(gas[['quarter']]) ||
                !setequal(levels(gas[['quarter']]), c('Q1','Q2','Q3','Q4')) ||
                !all(as.character(gas[['quarter']]) == rq))
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q5 seasonal_effect（quarter, seasonal）
      # ============================================
      - name: Q5 seasonal_effect
        id: q5
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q5 seasonal_effect
          command: >
            Rscript -e "source('HW5.R');
            n <- length(UKgas); rt <- 1:n; rY <- as.numeric(UKgas);
            rtr <- as.numeric(predict(lm(rY ~ rt + I(rt^2))));
            rq <- rep(c('Q1','Q2','Q3','Q4'), times=n/4); rsb <- tapply(rY - rtr, rq, mean);
            ae <- function(a,b) isTRUE(all.equal(as.numeric(a), as.numeric(b), tolerance=1e-6));
            ok <- FALSE;
            if (exists('seasonal_effect') && is.data.frame(seasonal_effect) &&
                all(c('quarter','seasonal') %in% names(seasonal_effect)) && nrow(seasonal_effect)==4) {
              idx <- match(c('Q1','Q2','Q3','Q4'), as.character(seasonal_effect[['quarter']]));
              ok <- !any(is.na(idx)) && ae(seasonal_effect[['seasonal']][idx], as.numeric(rsb[c('Q1','Q2','Q3','Q4')]))
            };
            if (!ok) quit(status=1)"
          max-score: 1

      # ============================================
      # Q6 gas$seasonal
      # ============================================
      - name: Q6 gas seasonal
        id: q6
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q6 gas seasonal
          command: >
            Rscript -e "source('HW5.R');
            n <- length(UKgas); rt <- 1:n; rY <- as.numeric(UKgas);
            rtr <- as.numeric(predict(lm(rY ~ rt + I(rt^2))));
            rq <- rep(c('Q1','Q2','Q3','Q4'), times=n/4);
            rse <- as.numeric(tapply(rY - rtr, rq, mean)[rq]);
            ae <- function(a,b) isTRUE(all.equal(as.numeric(a), as.numeric(b), tolerance=1e-6));
            if (!exists('gas') || !('seasonal' %in% names(gas)) || !ae(gas[['seasonal']], rse))
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q7 gas$irregular（Y = trend + seasonal + irregular）
      # ============================================
      - name: Q7 gas irregular
        id: q7
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q7 gas irregular
          command: >
            Rscript -e "source('HW5.R');
            n <- length(UKgas); rt <- 1:n; rY <- as.numeric(UKgas);
            rtr <- as.numeric(predict(lm(rY ~ rt + I(rt^2))));
            rq <- rep(c('Q1','Q2','Q3','Q4'), times=n/4);
            rse <- as.numeric(tapply(rY - rtr, rq, mean)[rq]); rir <- rY - rtr - rse;
            ae <- function(a,b) isTRUE(all.equal(as.numeric(a), as.numeric(b), tolerance=1e-6));
            if (!exists('gas') || !('irregular' %in% names(gas)) || !ae(gas[['irregular']], rir) ||
                !ae(gas[['Y']], gas[['trend']] + gas[['seasonal']] + gas[['irregular']]))
              quit(status=1)"
          max-score: 1

      # ============================================
      # Q8 plot_decomp（図オブジェクト）
      # ============================================
      - name: Q8 plot_decomp
        id: q8
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Q8 plot_decomp
          command: >
            Rscript -e "source('HW5.R');
            if (!exists('plot_decomp') || !inherits(plot_decomp, 'ggplot'))
              quit(status=1)"
          max-score: 1

      # ============================================
      # Reporter
      # ============================================
      - name: Autograding Reporter
        continue-on-error: true
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          Q1_RESULTS: "${{ steps.q1.outputs.result }}"
          Q2_RESULTS: "${{ steps.q2.outputs.result }}"
          Q3_RESULTS: "${{ steps.q3.outputs.result }}"
          Q4_RESULTS: "${{ steps.q4.outputs.result }}"
          Q5_RESULTS: "${{ steps.q5.outputs.result }}"
          Q6_RESULTS: "${{ steps.q6.outputs.result }}"
          Q7_RESULTS: "${{ steps.q7.outputs.result }}"
          Q8_RESULTS: "${{ steps.q8.outputs.result }}"
        with:
          runners: q1,q2,q3,q4,q5,q6,q7,q8
